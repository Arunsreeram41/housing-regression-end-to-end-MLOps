env:
  CLUSTER_NAME: housing-api-cluster-ecs
  AWS_REGION: ap-south-2

name: CI/CD Pipeline

on:
  push:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      # Build and push housing-api image
      - name: Build, Tag, and Push housing-api
        run: |
          IMAGE_TAG=${GITHUB_SHA}
          ECR_REGISTRY=240352458449.dkr.ecr.ap-south-2.amazonaws.com
          ECR_REPOSITORY=housing-api

          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG -f Dockerfile .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG

          docker tag $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG $ECR_REGISTRY/$ECR_REPOSITORY:latest
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest

      # Build and push housing-streamlit image
      - name: Build, Tag, and Push housing-streamlit
        run: |
          IMAGE_TAG=${GITHUB_SHA}
          ECR_REGISTRY=240352458449.dkr.ecr.ap-south-2.amazonaws.com
          ECR_REPOSITORY=housing-streamlit

          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG -f Dockerfile.streamlit .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG

          docker tag $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG $ECR_REGISTRY/$ECR_REPOSITORY:latest
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest

      # Deploy to ECS - API
      - name: Deploy housing-api-task-service-hk820xh3
        run: |
          aws ecs update-service \
            --cluster housing-api-cluster-ecs \
            --service housing-api-task-service-hk820xh3 \
            --force-new-deployment

      # Deploy to ECS - Streamlit
      - name: Deploy housing-streamlit-service
        run: |
          aws ecs update-service \
            --cluster housing-api-cluster-ecs \
            --service housing-streamlit-service \
            --force-new-deployment

      - name: Get Streamlit Public IP and Print URL
        run: |
          # Wait a few seconds for the network interface to attach
          sleep 15
          
          # 1. Get the Task ARN for the Streamlit service
          TASK_ARN=$(aws ecs list-tasks \
            --cluster ${{ env.CLUSTER_NAME }} \
            --service-name housing-streamlit-service \
            --query 'taskArns[0]' \
            --output text \
            --region ${{ env.AWS_REGION }})
          
          # 2. Get the Network Interface ID (ENI)
          ENI_ID=$(aws ecs describe-tasks \
            --cluster ${{ env.CLUSTER_NAME }} \
            --tasks $TASK_ARN \
            --query 'tasks[0].attachments[0].details[?name==`networkInterfaceId`].value' \
            --output text \
            --region ${{ env.AWS_REGION }})
          
          # 3. Get the Public IP from the ENI
          PUBLIC_IP=$(aws ec2 describe-network-interfaces \
            --network-interface-ids $ENI_ID \
            --query 'NetworkInterfaces[0].Association.PublicIp' \
            --output text \
            --region ${{ env.AWS_REGION }})
          
          echo "===================================================="
          echo "🚀 DEPLOYMENT SUCCESSFUL!"
          echo "🔗 DASHBOARD URL: http://$PUBLIC_IP:8501"
          echo "===================================================="